<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BirdsEye — from agents, to agents</title>
<meta name="description" content="BirdsEye: A Kustomer CRM toolbar for Scentbird agents. Real-time customer data, subscription management, refunds, and queue actions — all in one place.">
<link rel="icon" type="image/png" href="logo.png">
<style>
  :root {
    --bg: #0d0b08;
    --bg-elevated: #161310;
    --amber-50:  #faeeda;
    --amber-100: #fac775;
    --amber-200: #ef9f27;
    --amber-400: #ba7517;
    --amber-600: #854f0b;
    --amber-800: #412402;
    --bronze: #b88a4a;
    --text-primary: #f5ead4;
    --text-secondary: #b8a785;
    --text-muted: #7a6a50;
    --border: rgba(186, 117, 23, 0.25);
    --border-strong: rgba(239, 159, 39, 0.45);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-weight: 400;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Radial warm vignette in the background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 40%, rgba(186, 138, 74, 0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 20% 80%, rgba(133, 79, 11, 0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ===== HERO with overlaid buttons + terminal ===== */
  .hero {
    position: relative;
    width: 100%;
    max-width: 900px;
    margin: 1rem auto 0;
    aspect-ratio: 1 / 1;
    border-radius: 24px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(186, 138, 74, 0.15),
      0 20px 60px rgba(0, 0, 0, 0.6),
      0 0 80px rgba(186, 138, 74, 0.08);
  }

  .hero-image {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
  }

  /* Dark gradient overlay at the bottom so text/controls are readable */
  .hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg, transparent 40%, rgba(13, 11, 8, 0.55) 70%, rgba(13, 11, 8, 0.85) 100%);
    pointer-events: none;
    z-index: 1;
  }

  /* The overlay panel that holds both buttons and terminal, positioned at bottom of hero */
  .console {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 2;
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    gap: 20px;
    padding: 24px;
    align-items: end;
  }

  .actions-col {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .actions-col .btn {
    justify-content: flex-start;
    width: 100%;
    background: rgba(13, 11, 8, 0.72);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  .actions-col .btn:hover {
    background: rgba(239, 159, 39, 0.25);
  }

  .actions-col .btn-primary {
    background: linear-gradient(180deg, var(--amber-400) 0%, var(--amber-600) 100%);
  }

  .actions-col .btn-primary:hover {
    background: linear-gradient(180deg, var(--amber-200) 0%, var(--amber-400) 100%);
  }

  /* ===== BUTTONS ===== */
  .btn {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 24px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    color: var(--amber-50);
    background: linear-gradient(180deg, rgba(186, 117, 23, 0.18) 0%, rgba(133, 79, 11, 0.18) 100%);
    border: 1px solid var(--border-strong);
    border-radius: 10px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s ease;
    letter-spacing: 0.2px;
  }

  .btn:hover {
    background: linear-gradient(180deg, rgba(239, 159, 39, 0.25) 0%, rgba(186, 117, 23, 0.25) 100%);
    border-color: var(--amber-200);
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(239, 159, 39, 0.15);
  }

  .btn:active { transform: translateY(0); }

  .btn-primary {
    background: linear-gradient(180deg, var(--amber-400) 0%, var(--amber-600) 100%);
    border-color: var(--amber-200);
    color: #1a0f00;
    font-weight: 600;
  }

  .btn-primary:hover {
    background: linear-gradient(180deg, var(--amber-200) 0%, var(--amber-400) 100%);
    box-shadow: 0 8px 28px rgba(239, 159, 39, 0.35);
  }

  .btn-icon { width: 16px; height: 16px; flex-shrink: 0; }

  .btn-hint {
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    margin-top: 4px;
  }

  /* ===== INSTALL PROGRESS ===== */
  .install-progress {
    display: none;
    max-width: 460px;
    margin: 1.5rem auto 0;
    padding: 1rem 1.25rem;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  .install-progress.active { display: block; }

  .install-progress h3 {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 12px;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }

  .step {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 0;
    font-size: 14px;
    color: var(--text-muted);
    transition: color 0.3s ease;
  }

  .step.active { color: var(--text-primary); }
  .step.done { color: var(--amber-100); }

  .step-indicator {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1.5px solid currentColor;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    flex-shrink: 0;
  }

  .step.done .step-indicator { background: var(--amber-400); border-color: var(--amber-400); color: #1a0f00; }
  .step.active .step-indicator { border-color: var(--amber-200); }
  .step.active .step-indicator::after {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--amber-200);
    animation: pulse 1.2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  .step-action {
    margin-left: auto;
    padding: 6px 14px;
    font-size: 13px;
    background: transparent;
    color: var(--amber-100);
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .step-action:hover { background: rgba(239, 159, 39, 0.1); }
  .step-action:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ===== TERMINAL (right side of overlay) ===== */
  .terminal {
    background: rgba(13, 11, 8, 0.78);
    border: 1px solid var(--border-strong);
    border-radius: 10px;
    overflow: hidden;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  .terminal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: rgba(186, 117, 23, 0.15);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .terminal-dots {
    display: flex;
    gap: 5px;
  }

  .terminal-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(239, 159, 39, 0.3);
  }

  .terminal-dot.active { background: var(--amber-200); box-shadow: 0 0 5px var(--amber-200); }

  .terminal-title {
    font-family: 'JetBrains Mono', 'SF Mono', Monaco, monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.4px;
  }

  .terminal-body {
    padding: 10px 14px 12px;
    font-family: 'JetBrains Mono', 'SF Mono', Monaco, monospace;
    font-size: 11.5px;
    line-height: 1.6;
    color: var(--amber-100);
    flex: 1;
    min-height: 160px;
    max-height: 180px;
    overflow: hidden;
  }

  .terminal-line {
    white-space: pre-wrap;
    word-break: break-word;
  }

  .terminal-line .prompt { color: var(--amber-400); margin-right: 4px; }
  .terminal-line .ok { color: var(--amber-100); }
  .terminal-line .muted { color: var(--text-muted); }
  .terminal-line .dim { color: var(--bronze); }

  .cursor {
    display: inline-block;
    width: 6px;
    height: 11px;
    background: var(--amber-200);
    vertical-align: text-bottom;
    animation: blink 1s step-end infinite;
    margin-left: 1px;
  }

  @keyframes blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }

  /* ===== FOOTER ===== */
  .footer {
    margin-top: auto;
    padding-top: 3rem;
    text-align: center;
    color: var(--text-muted);
    font-size: 12px;
  }

  .footer a {
    color: var(--bronze);
    text-decoration: none;
  }

  .footer a:hover { color: var(--amber-100); }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 720px) {
    .page { padding: 1rem 1rem 3rem; }
    .hero { aspect-ratio: auto; min-height: 520px; }
    .console {
      grid-template-columns: 1fr;
      gap: 12px;
      padding: 14px;
    }
    .btn { padding: 10px 14px; font-size: 13px; }
    .actions-col .btn { justify-content: center; }
    .terminal-body {
      font-size: 10.5px;
      min-height: 120px;
      max-height: 140px;
    }
  }
</style>
</head>
<body>
<div class="page">

  <!-- HERO with overlaid buttons + terminal -->
  <section class="hero">
    <img src="logo.png" alt="BirdsEye logo" class="hero-image">

    <div class="console">

      <!-- LEFT: ACTION BUTTONS -->
      <div class="actions-col">
        <a class="btn" href="https://chromewebstore.google.com/detail/tampermonkey/dhdgffkkebhmkfjojejmpbldmpobfkfo" target="_blank" rel="noopener">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 7h-4V3H8v4H4l8 8 8-8zM4 21h16"/>
          </svg>
          Install Tampermonkey
        </a>

        <button class="btn btn-primary" id="installBtn">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9"/>
            <circle cx="12" cy="12" r="3" fill="currentColor"/>
            <line x1="12" y1="1" x2="12" y2="5"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="1" y1="12" x2="5" y2="12"/>
            <line x1="19" y1="12" x2="23" y2="12"/>
          </svg>
          Install BirdsEye
        </button>

        <a class="btn" href="https://github.com/ivanovichko/BirdsEye/raw/main/SOP_BIRDEYE.docx" download>
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Download SOP
        </a>
      </div>

      <!-- RIGHT: ANIMATED TERMINAL -->
      <div class="terminal" aria-hidden="true">
        <div class="terminal-header">
          <div class="terminal-dots">
            <span class="terminal-dot active"></span>
            <span class="terminal-dot"></span>
            <span class="terminal-dot"></span>
          </div>
          <span class="terminal-title">birdseye ~ live</span>
        </div>
        <div class="terminal-body" id="terminalBody"></div>
      </div>

    </div>
  </section>

  <!-- INSTALL PROGRESS (appears below hero when Install BirdsEye is clicked) -->
  <div class="install-progress" id="installProgress">
    <h3>Installing BirdsEye</h3>
    <div class="step" id="step1">
      <span class="step-indicator">1</span>
      <span>Token Helper</span>
      <button class="step-action" id="step1Action">Install</button>
    </div>
    <div class="step" id="step2">
      <span class="step-indicator">2</span>
      <span>BirdsEye core</span>
      <button class="step-action" id="step2Action" disabled>Install</button>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <p>from agents, to agents &nbsp;·&nbsp; <a href="https://github.com/ivanovichko/BirdsEye" target="_blank" rel="noopener">github</a></p>
  </footer>

</div>

<script>
/* =========================================================================
   INSTALL FLOW — sequential Tampermonkey userscript install
   ========================================================================= */
const TOKEN_HELPER_URL = 'https://raw.githubusercontent.com/ivanovichko/BirdsEye/main/BirdsEye%20-%20Token%20Helper.user.js';
const BIRDSEYE_URL     = 'https://raw.githubusercontent.com/ivanovichko/BirdsEye/main/birdseye.user.js';

const installBtn   = document.getElementById('installBtn');
const progressEl   = document.getElementById('installProgress');
const step1        = document.getElementById('step1');
const step2        = document.getElementById('step2');
const step1Action  = document.getElementById('step1Action');
const step2Action  = document.getElementById('step2Action');

installBtn.addEventListener('click', () => {
  progressEl.classList.add('active');
  progressEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  // Start at step 1
  step1.classList.add('active');
  step2Action.disabled = true;
});

step1Action.addEventListener('click', () => {
  window.open(TOKEN_HELPER_URL, '_blank', 'noopener');
  // Mark step 1 done visually (indicator only), unlock step 2
  step1.classList.remove('active');
  step1.classList.add('done');

  step2.classList.add('active');
  step2Action.disabled = false;
});

step2Action.addEventListener('click', () => {
  window.open(BIRDSEYE_URL, '_blank', 'noopener');
  step2.classList.remove('active');
  step2.classList.add('done');
});

/* =========================================================================
   TERMINAL ANIMATION — types lines character-by-character with realistic pacing
   ========================================================================= */
const terminalLines = [
  { html: '<span class="prompt">$</span> <span class="muted">birdseye v8.6 · ready</span>', pause: 900 },
  { html: '<span class="prompt">&gt;</span> auth handshake... <span class="ok">✓</span>', pause: 800 },
  { html: '<span class="prompt">&gt;</span> fetching queue...', pause: 1000 },
  { html: '<span class="prompt">&gt;</span> queue loaded <span class="dim">· 6 months</span>', pause: 900 },
  { html: '<span class="prompt">&gt;</span> scanning charges...', pause: 800 },
  { html: '<span class="prompt">&gt;</span> address mismatch <span class="ok">flagged</span>', pause: 1100 },
  { html: '<span class="prompt">&gt;</span> customer identified', pause: 900 },
  { html: '<span class="prompt">&gt;</span> package not received', pause: 800 },
  { html: '<span class="prompt">&gt;</span> replacement created <span class="ok">✓</span>', pause: 1000 },
  { html: '<span class="prompt">&gt;</span> refund processed <span class="dim">· $47.95</span>', pause: 900 },
  { html: '<span class="prompt">&gt;</span> queue item deleted', pause: 800 },
  { html: '<span class="prompt">&gt;</span> comment posted <span class="ok">✓</span>', pause: 1200 },
  { html: '<span class="muted">— idle —</span>', pause: 1800 },
];

const MAX_VISIBLE = 7;
const TYPE_SPEED = 28;           // ms per character
const TYPE_JITTER = 18;          // random extra per character
const terminalBody = document.getElementById('terminalBody');

// Parse HTML string into an array of { text, tagOpen, tagClose } tokens
// so we can type plain text one character at a time while keeping spans intact.
function parseLine(html) {
  const tokens = [];
  let i = 0;
  while (i < html.length) {
    if (html[i] === '<') {
      const end = html.indexOf('>', i);
      tokens.push({ type: 'tag', value: html.slice(i, end + 1) });
      i = end + 1;
    } else {
      let j = i;
      while (j < html.length && html[j] !== '<') j++;
      const text = html.slice(i, j);
      // Split text into individual chars (but handle &amp; &gt; &lt; etc. as single units)
      let k = 0;
      while (k < text.length) {
        if (text[k] === '&') {
          const semi = text.indexOf(';', k);
          if (semi !== -1 && semi - k < 8) {
            tokens.push({ type: 'char', value: text.slice(k, semi + 1) });
            k = semi + 1;
            continue;
          }
        }
        tokens.push({ type: 'char', value: text[k] });
        k++;
      }
      i = j;
    }
  }
  return tokens;
}

function typeLine(lineEl, tokens, cursorEl, done) {
  let buffer = '';
  let idx = 0;

  function step() {
    while (idx < tokens.length && tokens[idx].type === 'tag') {
      buffer += tokens[idx].value;
      idx++;
    }
    if (idx >= tokens.length) {
      lineEl.innerHTML = buffer;
      lineEl.appendChild(cursorEl);
      done();
      return;
    }
    buffer += tokens[idx].value;
    idx++;
    lineEl.innerHTML = buffer;
    lineEl.appendChild(cursorEl);
    setTimeout(step, TYPE_SPEED + Math.random() * TYPE_JITTER);
  }
  step();
}

let lineIndex = 0;

function nextLine() {
  const line = terminalLines[lineIndex % terminalLines.length];
  lineIndex++;

  // Create new line
  const el = document.createElement('div');
  el.className = 'terminal-line';
  terminalBody.appendChild(el);

  // Move cursor to this line
  document.querySelectorAll('.cursor').forEach(c => c.remove());
  const cursor = document.createElement('span');
  cursor.className = 'cursor';

  // Cap visible lines by removing the oldest
  const lines = terminalBody.querySelectorAll('.terminal-line');
  if (lines.length > MAX_VISIBLE) {
    lines[0].remove();
  }

  const tokens = parseLine(line.html);
  typeLine(el, tokens, cursor, () => {
    setTimeout(nextLine, line.pause);
  });
}

setTimeout(nextLine, 800);
</script>
</body>
</html>
